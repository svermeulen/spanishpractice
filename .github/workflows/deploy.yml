name: Deploy to GitHub Pages

# The app is fully static (everything lives in public/). This publishes that
# folder to GitHub Pages on every push to main. Enable Pages once in the repo
# settings: Settings → Pages → Build and deployment → Source: GitHub Actions.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# The official Pages actions still ship on their Node 20 runtime, which GitHub
# is deprecating. Opt every JS action in this workflow into the Node 24 runtime
# now to silence the deprecation warning (per GitHub's migration guidance).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
